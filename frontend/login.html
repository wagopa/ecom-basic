<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập | STOCKROOM</title>
  <meta name="description" content="Đăng nhập vào tài khoản STOCKROOM của bạn.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container narrow">
    <h1>Đăng nhập</h1>
    <form id="login-form" class="form-card">
      <label>Email
        <input type="email" id="email" required autocomplete="email">
      </label>
      <label>Mật khẩu
        <input type="password" id="password" required autocomplete="current-password">
      </label>
      <p class="error" id="login-error"></p>
      <button type="submit" class="primary" style="width:100%;">Đăng nhập</button>
    </form>
    <p class="muted small" style="margin-top:16px;">Chưa có tài khoản? <a href="register.html">Tạo tài khoản mới</a></p>
    <p class="muted small">Tài khoản admin mặc định: <code>admin@ecommerce.com</code> / <code>Admin@123</code> (thay đổi trong .env)</p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/page-login.js"></script>
</body>
</html>
