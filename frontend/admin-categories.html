<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản trị &middot; Danh mục | STOCKROOM</title>
  <meta name="description" content="Quản lý danh mục sản phẩm — STOCKROOM">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
      <h1 style="margin: 0;">Quản lý Danh mục</h1>
      <button type="button" class="primary" id="toggle-form-btn" style="padding: 8px 16px;">+ Thêm danh mục</button>
    </div>

    <form id="category-form" class="form-card" style="margin-bottom:32px; display: none;">
      <label>Tên danh mục
        <input type="text" id="cat-name" required maxlength="100">
      </label>
      <label>Mô tả <span class="muted small">(không bắt buộc)</span>
        <textarea id="cat-description" rows="2" maxlength="500"></textarea>
      </label>
      <p class="error" id="form-error"></p>
      <div class="form-actions">
        <button type="submit" class="primary">Lưu danh mục</button>
        <button type="button" class="secondary" id="cancel-edit-btn" style="display:none;">Huỷ chỉnh sửa</button>
      </div>
    </form>

    <h2>Tất cả danh mục</h2>
    <table>
      <thead><tr><th>Tên</th><th>Mô tả</th><th></th></tr></thead>
      <tbody id="categories-tbody">
        <tr><td colspan="3" class="muted">Đang tải&hellip;</td></tr>
      </tbody>
    </table>
    <div id="pagination" class="pagination"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin-categories.js"></script>
</body>
</html>
