<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản trị &middot; Sản phẩm | STOCKROOM</title>
  <meta name="description" content="Quản lý sản phẩm — STOCKROOM">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <div id="products-list-view">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
        <h1 style="margin: 0;">Quản lý Sản phẩm</h1>
        <button type="button" class="primary" id="toggle-form-btn" style="padding: 8px 16px;">+ Thêm sản phẩm</button>
      </div>

      <form id="product-form" class="form-card" style="margin-bottom:32px; display: none;">
        <div class="form-row">
          <label>Tên sản phẩm
            <input type="text" id="prod-name" required maxlength="255">
          </label>
          <label>Danh mục
            <select id="prod-category" required></select>
          </label>
        </div>
        <div class="form-row">
          <label>Giá (USD)
            <input type="number" id="prod-price" required min="0.01" step="0.01">
          </label>
          <label>Số lượng tồn kho
            <input type="number" id="prod-quantity" required min="0" step="1">
          </label>
        </div>
        <label>Đường dẫn ảnh <span class="muted small">(không bắt buộc, phải bắt đầu bằng http:// hoặc https://)</span>
          <input type="url" id="prod-image" placeholder="https://example.com/photo.jpg">
        </label>
        <label>Mô tả <span class="muted small">(không bắt buộc)</span>
          <textarea id="prod-description" rows="3" maxlength="2000"></textarea>
        </label>
        <p class="error" id="form-error"></p>
        <div class="form-actions">
          <button type="submit" class="primary">Lưu sản phẩm</button>
          <button type="button" class="secondary" id="cancel-edit-btn" style="display:none;">Huỷ chỉnh sửa</button>
        </div>
      </form>

      <h2>Tất cả sản phẩm</h2>
      <table>
        <thead><tr><th>Ảnh</th><th>Tên sản phẩm (nhấp xem chi tiết)</th><th>Danh mục</th><th>Giá</th><th>Tồn kho</th><th></th></tr></thead>
        <tbody id="products-tbody">
          <tr><td colspan="5" class="muted">Đang tải&hellip;</td></tr>
        </tbody>
      </table>
      <div id="pagination" class="pagination"></div>
    </div>

    <!-- Product Details View -->
    <div id="product-details-view" class="form-card" style="display: none; margin-bottom: 32px;">
      <div style="margin-bottom: 20px;">
        <button type="button" class="secondary" id="back-to-products-btn" style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Quay lại danh sách
        </button>
      </div>
      <h2 style="margin-top: 0; border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 20px;">Chi tiết sản phẩm</h2>
      <div id="product-details-content" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Dynamic details go here -->
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin-products.js"></script>
</body>
</html>
