<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tạo tài khoản | STOCKROOM</title>
  <meta name="description" content="Đăng ký tài khoản STOCKROOM mới.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container narrow">
    <h1>Tạo tài khoản</h1>
    <form id="register-form" class="form-card">
      <label>Họ và tên
        <input type="text" id="fullName" required>
      </label>
      <label>Email
        <input type="email" id="email" required autocomplete="email">
      </label>
      <label>Mật khẩu
        <input type="password" id="password" required minlength="6" autocomplete="new-password">
      </label>
      <label>Số điện thoại <span class="muted small">(không bắt buộc, 9&ndash;11 chữ số)</span>
        <input type="text" id="phone" pattern="[0-9]{9,11}">
      </label>
      <p class="error" id="register-error"></p>
      <button type="submit" class="primary" style="width:100%;">Tạo tài khoản</button>
    </form>
    <p class="muted small" style="margin-top:16px;">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/page-register.js"></script>
</body>
</html>
